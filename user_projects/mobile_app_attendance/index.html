<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1d23;
            color: #fff;
        }
        .glassmorphic {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .container {
            max-width: 400px;
            margin: 40px auto;
            padding: 20px;
            text-align: center;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .camera-container {
            position: relative;
            width: 100%;
            height: 200px;
            margin-bottom: 20px;
            border-radius: 12px;
            overflow: hidden;
        }
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background-color: #4CAF50;
            color: #fff;
            cursor: pointer;
        }
        button:hover {
            background-color: #3e8e41;
        }
        #coordinates {
            font-size: 14px;
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="container glassmorphic">
        <h1>Attendance Tracker</h1>
        <div class="camera-container">
            <video id="video" autoplay></video>
        </div>
        <button id="take-attendance">Take Attendance</button>
        <p id="coordinates"></p>
    </div>
    <script>
        let video = document.getElementById('video');
        let takeAttendanceButton = document.getElementById('take-attendance');
        let coordinatesElement = document.getElementById('coordinates');
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
            })
            .catch(error => {
                console.error('Error accessing the camera:', error);
            });
        takeAttendanceButton.addEventListener('click', () => {
            navigator.geolocation.getCurrentPosition(position => {
                let latitude = position.coords.latitude;
                let longitude = position.coords.longitude;
                coordinatesElement.innerText = `Latitude: ${latitude}, Longitude: ${longitude}`;
                // Add your attendance tracking logic here
            }, error => {
                console.error('Error getting geolocation:', error);
            });
        });
    </script>
</body>
</html>
